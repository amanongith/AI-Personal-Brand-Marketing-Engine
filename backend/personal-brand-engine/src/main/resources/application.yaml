server:
  port: 8080

spring:
  application:
    name: personal-brand-engine

  datasource:
    url: jdbc:h2:mem:branddb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini

springdoc:
  swagger-ui:
    path: /swagger-ui.html
