spring:
  application:
    name: personal-brand-engine
  
  datasource:
    url: jdbc:h2:file:~/personal_brand_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:mySecretKeyForPersonalBrandEngineApplicationThatIsLongEnoughForHS256}
  expiration: 86400000
  refresh-expiration: 604800000

spring-ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-test-key}
    base-url: https://api.openai.com/v1
    chat:
      options:
        model: gpt-4o-mini
        temperature: 0.7
        max-tokens: 2000

logging:
  level:
    root: INFO
    com.personalbrand: DEBUG
    org.springframework.security: DEBUG
