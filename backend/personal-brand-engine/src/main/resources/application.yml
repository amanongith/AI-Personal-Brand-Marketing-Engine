spring:
  application:
    name: personal-brand-engine
  
  datasource:
    url: jdbc:h2:file:~/personal_brand_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  profiles:
    active: dev
 
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-test-key}
      base-url: https://api.openai.com/v1
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:mySecretKeyForPersonalBrandEngineApplicationThatIsLongEnoughForHS256}
  expiration: 86400000
  refresh-expiration: 604800000



social:
  linkedin:
    client-id: ${LINKEDIN_CLIENT_ID:mock-linkedin-id}
    client-secret: ${LINKEDIN_CLIENT_SECRET:mock-linkedin-secret}
  twitter:
    client-id: ${TWITTER_CLIENT_ID:mock-twitter-id}
    client-secret: ${TWITTER_CLIENT_SECRET:mock-twitter-secret}
  google:
    client-id: ${GOOGLE_CLIENT_ID:mock-google-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-secret}

logging:
  level:
    root: INFO
    com.personalbrand: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
