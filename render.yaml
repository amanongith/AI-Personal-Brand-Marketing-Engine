services:
  # Backend Spring Boot Service
  - type: web
    name: brand-backend
    env: docker
    dockerfilePath: backend/personal-brand-engine/Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
 
  # Frontend Vite Nginx Proxy Service
  - type: web
    name: brand-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
