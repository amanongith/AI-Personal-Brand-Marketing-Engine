version: '3.8'
 
services:
  backend:
    image: ghcr.io/amanongith/ai-personal-brand-marketing-engine-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    restart: always
 
  frontend:
    image: ghcr.io/amanongith/ai-personal-brand-marketing-engine-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
