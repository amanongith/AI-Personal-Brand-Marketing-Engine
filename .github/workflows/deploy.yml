name: Build and Push Unified Full-Stack Container to GHCR
 
on:
  push:
    branches:
      - main
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/amanongith/ai-personal-brand-marketing-engine
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
 
      - name: Install Frontend Dependencies and Build
        run: |
          cd frontend
          npm ci
          npm run build
 
      - name: Copy Frontend Build to Spring Boot Static Resources
        run: |
          mkdir -p backend/personal-brand-engine/src/main/resources/static
          cp -r frontend/dist/* backend/personal-brand-engine/src/main/resources/static/
 
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Build and push unified Full-Stack Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/personal-brand-engine
          file: ./backend/personal-brand-engine/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
