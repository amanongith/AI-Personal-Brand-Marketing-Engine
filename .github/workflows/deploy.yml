name: Build and Push to GHCR
 
on:
  push:
    branches:
      - main
 
env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/amanongith/ai-personal-brand-marketing-engine-backend
  FRONTEND_IMAGE: ghcr.io/amanongith/ai-personal-brand-marketing-engine-frontend
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
 
      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/personal-brand-engine
          file: ./backend/personal-brand-engine/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta-backend.outputs.labels }}
 
      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
 
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          labels: ${{ steps.meta-frontend.outputs.labels }}
